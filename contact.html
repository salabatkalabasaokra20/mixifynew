<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Mixify</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  min-height:100vh;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
}

.logo{
  font-size:28px;
  font-weight:bold;
  color:#00ffd5;
}

.nav-links a{
  color:#ccc;
  text-decoration:none;
  margin-left:20px;
  transition:.3s;
}

.nav-links a:hover{
  color:#00ffd5;
}

/* CONTACT SECTION */
.contact-section{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:60px 20px;
}

.contact-box{
  width:100%;
  max-width:700px;
  background:rgba(255,255,255,0.05);
  padding:40px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.contact-box h1{
  font-size:42px;
  margin-bottom:10px;
  color:#00ffd5;
}

.contact-box p{
  color:#ccc;
  margin-bottom:30px;
}

form{
  display:flex;
  flex-direction:column;
}

input,
textarea{
  margin-bottom:20px;
  padding:15px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  color:white;
  font-size:16px;
  outline:none;
}

input::placeholder,
textarea::placeholder{
  color:#bbb;
}

textarea{
  min-height:150px;
  resize:none;
}

button{
  padding:15px;
  border:none;
  border-radius:30px;
  background:#00ffd5;
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:.3s;
  font-size:16px;
}

button:hover{
  background:#00c2a8;
  transform:scale(1.03);
}

.contact-info{
  margin-top:30px;
  border-top:1px solid rgba(255,255,255,0.1);
  padding-top:20px;
}

.contact-info p{
  margin:10px 0;
  color:#ddd;
}

@media(max-width:700px){
  .navbar{
    flex-direction:column;
    gap:15px;
  }

  .contact-box{
    padding:25px;
  }

  .contact-box h1{
    font-size:32px;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">Mixify</div>

  <div class="nav-links">
    <a href="home.html">Home</a>
    <a href="aboutus.html">About Us</a>
    <a href="explore.html">Explore</a>
    <a href="contact.html">Contact Us</a>
    <a href="acc.html">Account</a>

    <!-- LOGOUT -->
    <a href="#" onclick="logout()" style="color:#ff4d4d;">Logout</a>
  </div>
</div>

<!-- CONTACT -->
<section class="contact-section">

  <div class="contact-box">

    <h1>Contact Us</h1>
    <p>
      Have questions, feedback, or music suggestions?
      We'd love to hear from you.
    </p>

    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea placeholder="Your Message..." required></textarea>
      <button type="submit">Send Message</button>
    </form>

    <div class="contact-info">
      <p>📧 Email: support@mixify.com</p>
      <p>📱 Phone: +63 912 345 6789</p>
      <p>📍 Location: Valenzuela, Philippines</p>
    </div>

  </div>

</section>

<!-- LOGOUT SCRIPT -->
<script>
function logout() {
  // optional: clear login session later
  // localStorage.clear();

  window.location.href = "login.html";
}
</script>

</body>
</html>
