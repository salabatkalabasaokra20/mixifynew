<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mixify - Login / Sign Up</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  color:#fff;
  background-image:url("mixi.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

body::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:0;
}

.container{
  position:relative;
  z-index:1;
  width:360px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(15px);
  border-radius:15px;
  padding:30px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.logo{
  text-align:center;
  font-size:28px;
  font-weight:bold;
  color:#00ffd5;
  margin-bottom:10px;
}

.toggle{
  display:flex;
  justify-content:space-between;
  margin:20px 0;
  background:rgba(0,0,0,0.2);
  border-radius:25px;
  overflow:hidden;
}

.toggle button{
  flex:1;
  padding:10px;
  border:none;
  cursor:pointer;
  background:transparent;
  color:#ccc;
  font-weight:bold;
}

.toggle button.active{
  background:#00ffd5;
  color:#000;
}

form{
  display:none;
  flex-direction:column;
  gap:12px;
}

form.active{
  display:flex;
}

input, select{
  padding:12px;
  border:none;
  border-radius:8px;
  outline:none;
}

button.submit{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#00ffd5;
  font-weight:bold;
  cursor:pointer;
}

button.submit:hover{
  background:#00c2a8;
}

.small{
  text-align:center;
  font-size:12px;
  color:#ccc;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">Mixify</div>

  <div class="toggle">
    <button id="loginBtn" class="active" onclick="showLogin()">Login</button>
    <button id="signupBtn" onclick="showSignup()">Sign Up</button>
  </div>

  <!-- LOGIN -->
  <form id="loginForm" class="active">

    <input type="text" placeholder="Username" required />
    <input type="password" placeholder="Password" required />

    <select id="loginRole" required>
      <option value="user">Listener</option>
      <option value="admin">Admin</option>
      <option value="superadmin">Super Admin</option>
    </select>

    <button class="submit" type="button" onclick="loginUser()">
      Login
    </button>

  </form>

  <!-- SIGNUP -->
  <form id="signupForm">

    <input type="text" placeholder="Username" required />
    <input type="email" placeholder="Email" required />
    <input type="password" placeholder="Password" required />

    <button class="submit" type="button" onclick="signupUser()">
      Create Account
    </button>

  </form>

  <div class="small">Bring out your vibe</div>

</div>

<script>

/* SWITCH FORMS */
function showLogin(){
  document.getElementById('loginForm').classList.add('active');
  document.getElementById('signupForm').classList.remove('active');
}

function showSignup(){
  document.getElementById('signupForm').classList.add('active');
  document.getElementById('loginForm').classList.remove('active');
}

/* SIGNUP */
function signupUser(){

  const username =
    document.querySelector('#signupForm input[type="text"]').value;

  const email =
    document.querySelector('#signupForm input[type="email"]').value;

  const password =
    document.querySelector('#signupForm input[type="password"]').value;

  if(username && email && password){

    localStorage.setItem('mixifyUser',
      JSON.stringify({ username, email, password })
    );

    alert("Account created! Please login.");
    showLogin();
  }
}

/* LOGIN (UPDATED - IMPORTANT PART) */
function loginUser(){

  const username =
    document.querySelector('#loginForm input[type="text"]').value;

  const password =
    document.querySelector('#loginForm input[type="password"]').value;

  const role =
    document.getElementById('loginRole').value;

  const savedUser =
    JSON.parse(localStorage.getItem('mixifyUser'));

  if(savedUser &&
     username === savedUser.username &&
     password === savedUser.password){

    // ALWAYS store session
    localStorage.setItem("loggedIn", "true");
    localStorage.setItem("role", role);
    localStorage.setItem("username", username);

    alert("Login successful!");

    // redirect all to home
    window.location.href = "home.html";

  } else {
    alert("Invalid credentials");
  }
}

</script>

</body>
</html>
